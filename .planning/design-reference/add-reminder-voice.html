<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1a3c5b",
                        "accent": "#4A90D9",
                        "background-light": "#f6f7f8",
                        "background-dark": "#13191f",
                        "soft-grey": "#F0F4F8",
                        "teal-accent": "#2DD4BF"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .waveform-bar {
            width: 3px;
            background-color: #1a3c5b;
            border-radius: 2px;
            margin: 0 1px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-white font-display text-slate-900 antialiased">
<div class="relative flex min-h-screen flex-col bg-white overflow-x-hidden">
<!-- Header -->
<header class="flex items-center justify-between px-4 py-6 bg-white sticky top-0 z-10">
<div class="flex w-12 items-center">
<span class="material-symbols-outlined text-primary cursor-pointer text-2xl">arrow_back</span>
</div>
<h1 class="text-[22pt] font-bold text-primary flex-1 text-center">New Reminder</h1>
<div class="flex w-12 items-center justify-end">
<button class="text-accent text-base font-semibold">Templates</button>
</div>
</header>
<!-- Input Mode Toggle -->
<div class="px-4 mb-6">
<div class="flex h-12 w-full items-center justify-center rounded-xl bg-soft-grey p-1.5">
<button class="flex h-full grow items-center justify-center gap-2 rounded-lg bg-primary text-white shadow-sm transition-all">
<span class="material-symbols-outlined text-[20px]">mic</span>
<span class="text-sm font-bold">Say It</span>
</button>
<button class="flex h-full grow items-center justify-center gap-2 rounded-lg text-slate-500 hover:bg-slate-200/50 transition-all">
<span class="material-symbols-outlined text-[20px]">tune</span>
<span class="text-sm font-bold">Build It</span>
</button>
</div>
</div>
<!-- Main Input Area (Say It Mode) -->
<div class="px-4 mb-4">
<div class="relative flex flex-col rounded-xl bg-soft-grey p-5 min-h-[120pt]">
<textarea class="w-full bg-transparent border-none focus:ring-0 text-[17pt] italic text-slate-400 placeholder-slate-400 resize-none p-0 leading-relaxed" placeholder="e.g. Take Paracetamol 5 minutes before lunch and Dolo 30 minutes after lunch..."></textarea>
<!-- Mic & Waveform Visualizer -->
<div class="absolute bottom-4 right-4 flex items-end gap-1 bg-white p-3 rounded-full shadow-md">
<div class="flex items-center gap-1.5 px-1">
<div class="waveform-bar h-2"></div>
<div class="waveform-bar h-4"></div>
<div class="waveform-bar h-6"></div>
<div class="waveform-bar h-3"></div>
<div class="waveform-bar h-5"></div>
</div>
<span class="material-symbols-outlined text-primary text-2xl">mic</span>
</div>
</div>
</div>
<!-- Example Phrases -->
<div class="mb-8">
<h3 class="text-slate-500 text-sm font-semibold px-4 mb-3 uppercase tracking-wider">Example phrases</h3>
<div class="flex gap-3 px-4 overflow-x-auto no-scrollbar pb-2">
<div class="flex shrink-0 items-center justify-center rounded-full bg-soft-grey px-5 py-2 border border-slate-200">
<p class="text-primary text-sm font-medium">Before meal medicine</p>
</div>
<div class="flex shrink-0 items-center justify-center rounded-full bg-soft-grey px-5 py-2 border border-slate-200">
<p class="text-primary text-sm font-medium">After Iftar</p>
</div>
<div class="flex shrink-0 items-center justify-center rounded-full bg-soft-grey px-5 py-2 border border-slate-200">
<p class="text-primary text-sm font-medium">Call my son weekly</p>
</div>
</div>
</div>
<!-- Parsed Chain Preview Panel -->
<div class="mt-auto px-4 pb-32">
<div class="bg-primary/5 rounded-2xl p-6 border border-primary/10">
<h3 class="text-[16pt] font-semibold text-primary mb-6">I'll remind you:</h3>
<div class="space-y-0 relative">
<!-- Connector Line -->
<div class="absolute left-[7px] top-4 bottom-4 w-px border-l-2 border-dotted border-teal-accent/50"></div>
<!-- Row 1 -->
<div class="flex items-center gap-4 relative z-10 mb-8">
<div class="size-4 rounded-full bg-teal-accent ring-4 ring-teal-accent/20"></div>
<div class="flex flex-1 items-baseline justify-between">
<span class="text-lg font-bold text-primary">12:55 PM</span>
<span class="text-slate-600 font-medium">Paracetamol 500mg</span>
</div>
</div>
<!-- Row 2 -->
<div class="flex items-center gap-4 relative z-10">
<div class="size-4 rounded-full bg-teal-accent ring-4 ring-teal-accent/20"></div>
<div class="flex flex-1 items-baseline justify-between">
<span class="text-lg font-bold text-primary">1:30 PM</span>
<span class="text-slate-600 font-medium">Dolo 650mg</span>
</div>
</div>
</div>
<div class="mt-8 flex items-center justify-between border-t border-primary/10 pt-4">
<span class="text-slate-500 font-medium">Looks right?</span>
<div class="flex gap-2">
<button class="px-4 py-1.5 rounded-lg border border-primary text-primary text-sm font-bold">Edit</button>
<button class="px-4 py-1.5 rounded-lg bg-accent text-white text-sm font-bold">Confirm</button>
</div>
</div>
</div>
</div>
<!-- Sticky Bottom Bar -->
<div class="fixed bottom-0 left-0 w-full bg-white border-t border-slate-100 p-4 pb-8 z-20">
<button class="w-full h-[56pt] bg-primary text-white rounded-[14px] text-[20pt] font-bold shadow-lg hover:bg-primary/90 transition-colors">
                Add to My Day
            </button>
</div>
</div>
</body></html>
